<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="admin-controls">
      <button id="admin-toggle" aria-label="Teacher account">👤</button>
      <div id="admin-panel" class="hidden" role="dialog" aria-modal="false">
        <div id="admin-auth-view">
          <p>Teacher tools are locked.</p>
          <button id="open-login" type="button">Login</button>
        </div>
        <div id="admin-user-view" class="hidden">
          <p id="admin-user-text"></p>
          <button id="logout-btn" type="button">Logout</button>
        </div>
      </div>
    </div>

    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Register Student to an Activity</h3>
        <p id="teacher-only-note" class="info">Teacher login required to manage registrations.</p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <div id="login-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="login-title">
      <div class="modal-card">
        <h3 id="login-title">Teacher Login</h3>
        <form id="login-form">
          <div class="form-group">
            <label for="admin-username">Username</label>
            <input type="text" id="admin-username" required />
          </div>
          <div class="form-group">
            <label for="admin-password">Password</label>
            <input type="password" id="admin-password" required />
          </div>
          <div class="modal-actions">
            <button type="button" id="cancel-login" class="secondary">Cancel</button>
            <button type="submit">Login</button>
          </div>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
